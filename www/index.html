<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forager</title>
<link rel="icon" type="image/svg+xml" href="/forager.svg">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #161616;
  --border: #2a2a2a;
  --text: #e0e0e0;
  --dim: #777;
  --accent: #4fc3f7;
  --green: #66bb6a;
  --yellow: #fdd835;
  --red: #ef5350;
  --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.6;
  padding: 24px 16px;
  display: flex;
  justify-content: center;
}
#app { width: 100%; max-width: 520px; }

/* Desktop two-column layout */
@media (min-width: 960px) {
  #app { max-width: 1080px; }
  .two-col { display: flex; gap: 16px; align-items: flex-start; }
  .col-left { flex: 1; min-width: 0; }
  .col-right { flex: 1; min-width: 0; }
}
@media (max-width: 959px) {
  .two-col { display: block; }
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 16px;
  overflow: hidden;
}
.card-header {
  display: flex;
  align-items: center;
  padding: 16px 20px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--dim);
  cursor: pointer;
  user-select: none;
}
.card-header:hover { background: rgba(255,255,255,0.02); }
.card-toggle {
  display: inline-block;
  width: 0;
  height: 0;
  border-left: 5px solid var(--dim);
  border-top: 4px solid transparent;
  border-bottom: 4px solid transparent;
  margin-right: 10px;
  transition: transform 0.15s;
  flex-shrink: 0;
}
.card-toggle.open {
  transform: rotate(90deg);
}
.card-title { flex: 1; }
.card-summary {
  font-size: 11px;
  color: var(--dim);
  margin-left: 8px;
  text-transform: none;
  letter-spacing: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 200px;
  text-align: right;
}
.card-body {
  padding: 0 20px 20px;
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
}
.row .label { color: var(--dim); }
.row .value { text-align: right; }

.divider {
  border-top: 1px solid var(--border);
  margin: 12px 0;
}

.btn-row {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}
button {
  background: var(--border);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px 16px;
  font-family: var(--mono);
  font-size: 12px;
  cursor: pointer;
  flex: 1;
  transition: background 0.15s;
}
button:hover { background: #333; }
button:disabled { opacity: 0.4; cursor: not-allowed; }
button.primary { background: #1a3a4a; border-color: var(--accent); color: var(--accent); }
button.primary:hover { background: #1e4a5e; }


.history-list {
  max-height: 300px;
  overflow-y: auto;
}
.history-entry {
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.history-entry:last-child { border-bottom: none; }
.history-meta {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--dim);
  margin-bottom: 4px;
}
.history-details { font-size: 12px; }
.trigger-badge {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 3px;
  background: var(--border);
}
.trigger-badge.manual { color: var(--accent); }
.trigger-badge.scheduled { color: var(--green); }

.setting-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
}
.setting-row label { color: var(--dim); font-size: 12px; }
input[type="number"] {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  padding: 4px 8px;
  width: 100px;
  text-align: right;
  border-radius: 4px;
}
input[type="number"]:focus { outline: none; border-color: var(--accent); }

.toggle {
  position: relative;
  width: 40px;
  height: 22px;
  cursor: pointer;
}
.toggle input { display: none; }
.toggle .slider {
  position: absolute;
  inset: 0;
  background: var(--border);
  border-radius: 11px;
  transition: background 0.2s;
}
.toggle .slider::before {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  left: 3px;
  top: 3px;
  background: var(--dim);
  border-radius: 50%;
  transition: transform 0.2s, background 0.2s;
}
.toggle input:checked + .slider { background: #1a3a4a; }
.toggle input:checked + .slider::before { transform: translateX(18px); background: var(--accent); }

.cookie-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
}
.cookie-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.cookie-dot.set { background: var(--green); }
.cookie-dot.unset { background: var(--red); }
.cookie-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 6px 8px;
  border-radius: 4px;
  display: none;
}
.cookie-input:focus { outline: none; border-color: var(--accent); }
.cookie-input.visible { display: block; }

.countdown { color: var(--accent); font-size: 15px; }
.empty { color: var(--dim); font-style: italic; font-size: 12px; text-align: center; padding: 16px; }
.status-msg { color: var(--dim); font-size: 11px; text-align: center; margin-top: 8px; }

.paused-banner {
  background: #2a1a1a;
  border: 1px solid var(--red);
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.paused-banner .paused-label {
  color: var(--red);
  font-size: 14px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.paused-banner .paused-sub {
  color: var(--dim);
  font-size: 11px;
  margin-top: 2px;
}
.paused-banner button {
  flex: 0;
  background: #2a1a1a;
  border-color: var(--red);
  color: var(--red);
  padding: 8px 20px;
  font-size: 12px;
}
.paused-banner button:hover { background: #3a2a2a; }

.sim-reason { color: var(--dim); font-size: 11px; font-style: italic; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const $ = document.getElementById.bind(document);
let state = {};
let countdownInterval = null;
let pollInterval = null;
let refreshInterval = null;
let cookieVisible = false;
let busy = false;
let mbscVisible = false;
let uaVisible = false;

// Card collapse state — persisted to localStorage
let collapsed = JSON.parse(localStorage.getItem('forager_collapsed') || '{}');
function isCollapsed(id) { return !!collapsed[id]; }
function toggleCollapse(id) {
  collapsed[id] = !collapsed[id];
  localStorage.setItem('forager_collapsed', JSON.stringify(collapsed));
  render();
}

async function api(path, opts = {}) {
  const res = await fetch(path, opts);
  return res.json();
}

async function loadState() {
  try {
    const ver = state.version;
    state = await api('/state');
    if (ver) state.version = ver;
    render();
  } catch (e) {
    console.error('Failed to load state:', e);
  }
}

async function saveSetting(key, value) {
  const settings = {};
  settings[key] = value;
  state = await api('/state', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({settings})
  });
  // Restart auto-refresh timer if interval changed
  if (key === 'autoRefresh' || key === 'autoRefreshMinutes') {
    setupAutoRefresh();
  }
  render();
}

async function setCookie(val) {
  if (!val) return;
  state = await api('/state', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({currentCookie: val})
  });
  cookieVisible = false;
  render();
}

async function setBrowserSession(key, val) {
  if (!val) return;
  if (key === 'mbsc') val = val.replace(/^mbsc=/, '');
  const browserSession = {};
  browserSession[key] = val;
  if (key === 'mbsc') {
    browserSession.expired = false;
    browserSession.expiredAt = null;
  }
  state = await api('/state', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({browserSession})
  });
  mbscVisible = false;
  uaVisible = false;
  render();
}

async function doRefresh() {
  if (busy) return;
  busy = true;
  render();
  try {
    await api('/refresh', {method: 'POST'});
    await loadState();
  } catch(e) { console.error(e); }
  busy = false;
  render();
}

async function doSpend() {
  if (busy) return;
  if (!confirm('Run spend cycle now?')) return;
  busy = true;
  render();
  try {
    await api('/spend', {method: 'POST'});
    await loadState();
  } catch(e) { console.error(e); }
  busy = false;
  render();
}

async function togglePause() {
  const nowPaused = !!state.paused;
  state = await api('/state', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({paused: !nowPaused})
  });
  render();
}

function hasBrowserSession(st) {
  const bs = st.browserSession || {};
  return !!(bs.mbsc && bs.userAgent);
}

function isBrowserSessionExpired(st) {
  return !!(st.browserSession && st.browserSession.expired);
}

function fmt(n) {
  if (n == null) return '—';
  return Number(n).toLocaleString();
}

function fmtBytes(b) {
  if (b == null || b === '') return '—';
  const s = String(b);
  if (/[TGMK]B/i.test(s)) return s;
  const n = Number(s);
  if (isNaN(n)) return s;
  if (n >= 1099511627776) return (n / 1099511627776).toFixed(2) + ' TB';
  if (n >= 1073741824) return (n / 1073741824).toFixed(2) + ' GB';
  if (n >= 1048576) return (n / 1048576).toFixed(2) + ' MB';
  return n + ' B';
}

function timeAgo(ts) {
  if (!ts) return '—';
  const clean = ts.replace(/\[.*\]$/, '');
  const d = new Date(clean);
  const secs = Math.floor((Date.now() - d.getTime()) / 1000);
  if (secs < 60) return secs + 's ago';
  if (secs < 3600) return Math.floor(secs / 60) + 'm ago';
  if (secs < 86400) return Math.floor(secs / 3600) + 'h ago';
  return Math.floor(secs / 86400) + 'd ago';
}

function fmtDate(ts) {
  if (!ts) return '—';
  const clean = ts.replace(/\[.*\]$/, '');
  const d = new Date(clean);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const h = d.getHours();
  const m = d.getMinutes();
  const ampm = h >= 12 ? 'p' : 'a';
  const h12 = h % 12 || 12;
  return months[d.getMonth()] + ' ' + d.getDate() + ', ' + h12 + ':' + String(m).padStart(2, '0') + ampm;
}

function countdown(ts) {
  if (!ts) return '—';
  const clean = ts.replace(/\[.*\]$/, '');
  const d = new Date(clean);
  let secs = Math.floor((d.getTime() - Date.now()) / 1000);
  if (secs <= 0) return 'now';
  const h = Math.floor(secs / 3600);
  secs %= 3600;
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function fmtShortDate(ts) {
  if (!ts) return '—';
  const clean = ts.replace(/\[.*\]$/, '');
  const d = new Date(clean);
  if (isNaN(d.getTime())) return ts;
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()] + ' ' + d.getDate();
}

function vipDays(ts) {
  if (!ts) return null;
  const d = new Date(ts);
  return Math.floor((d.getTime() - Date.now()) / 86400000);
}

function ck(b) { return b ? '<span style="color:var(--green)">&#10003;</span>' : '<span style="color:var(--dim)">—</span>'; }

function cardHeader(id, title, summary, extraRight) {
  const open = !isCollapsed(id);
  return `
    <div class="card-header" onclick="toggleCollapse('${id}')">
      <span class="card-toggle ${open ? 'open' : ''}"></span>
      <span class="card-title">${title}</span>
      ${!open && summary ? '<span class="card-summary">' + summary + '</span>' : ''}
      ${open && extraRight ? '<span class="card-summary">' + extraRight + '</span>' : ''}
    </div>`;
}

function cardBody(id, content) {
  if (isCollapsed(id)) return '';
  return '<div class="card-body">' + content + '</div>';
}

function renderStats() {
  const p = state.profile || {};
  const s = state.settings || {};
  const hasCookie = !!state.currentCookie;
  const vd = vipDays(p.vipUntil);
  const vipDateStr = p.vipUntil ? fmtShortDate(p.vipUntil) : null;
  const vipStr = vipDateStr ? vipDateStr + (vd != null ? ' (' + vd + 'd)' : '') : '—';
  const pphVal = state.pointsPerHour || p.pointsPerHour;
  const pph = pphVal ? Number(pphVal).toLocaleString() : '—';

  let summary = '';
  if (p.username) {
    summary = fmt(p.bonusPoints) + ' pts';
    if (pphVal) summary += ' &middot; ' + pph + '/hr';
  } else {
    summary = '<span style="color:var(--red)">no cookie</span>';
  }

  let body = '';
  if (p.username) {
    body = `
      <div class="row"><span class="label">Bonus Points</span><span class="value">${fmt(p.bonusPoints)}</span></div>
      <div class="row"><span class="label">Points/Hour</span><span class="value">&asymp; ${pph}</span></div>
      ${p.satisfiedTorrents != null ? '<div class="row"><span class="label">Seeding</span><span class="value">' + fmt(p.satisfiedTorrents) + ' satisfied</span></div>' : ''}
      <div class="divider"></div>
      <div class="row"><span class="label">Uploaded</span><span class="value">${fmtBytes(p.uploaded)}</span></div>
      <div class="row"><span class="label">Downloaded</span><span class="value">${fmtBytes(p.downloaded)}</span></div>
      <div class="row"><span class="label">Ratio</span><span class="value">${p.ratio != null ? Number(p.ratio).toFixed(9) : '—'}</span></div>
      <div class="divider"></div>
      <div class="row"><span class="label">VIP Expires</span><span class="value">${vipStr}</span></div>
      <div class="row"><span class="label">Last Refreshed</span><span class="value">${timeAgo(p.fetchedAt)}</span></div>
    `;
  } else {
    body = '<div class="empty">Set your cookie below to get started</div>';
  }
  body += `
    <div class="btn-row">
      <button onclick="doRefresh()" ${busy ? 'disabled' : ''}>${busy ? 'Working...' : 'Refresh Stats'}</button>
    </div>
  `;

  return `
    <div class="card">
      ${cardHeader('stats', '<span style="display:flex;align-items:center;gap:8px"><img src="/forager.svg" alt="" style="width:18px;height:18px">FORAGER</span>', summary, 'v' + (state.version || '?'))}
      ${cardBody('stats', body)}
    </div>`;
}

function renderVault() {
  const v = state.vault || {};
  const s = state.settings || {};
  if (!s.vaultMode || s.vaultMode === 'off') return '';

  let summary = '';
  let borderStyle = '';

  if (!hasBrowserSession(state)) {
    summary = '<span style="color:var(--dim)">not configured</span>';
  } else if (isBrowserSessionExpired(state)) {
    summary = '<span style="color:var(--red)">session expired</span>';
    borderStyle = 'border-color:var(--red);';
  } else {
    const potAmt = v.currentPotAmount || 0;
    const potMax = v.potMax || 20000000;
    if (potAmt > 0) {
      const potPct = (potAmt / potMax * 100).toFixed(0);
      summary = fmt(potAmt) + ' / ' + fmt(potMax) + ' (' + potPct + '%)';
    } else {
      summary = s.vaultMode === 'daily' ? 'daily' : 'once/pot';
    }
  }

  let body = '';
  if (!hasBrowserSession(state)) {
    body = '<div class="empty">Set browser session cookie (mbsc) and User-Agent in settings to enable vault access</div>';
  } else if (isBrowserSessionExpired(state)) {
    const bs = state.browserSession || {};
    body = `
      <div style="color:var(--red);font-size:12px;text-align:center;padding:8px 0">
        Browser session has expired${bs.expiredAt ? ' (' + timeAgo(bs.expiredAt) + ')' : ''}.<br>
        Paste a fresh mbsc cookie from your browser in settings below.
      </div>`;
  } else {
    const contributed = v.currentPotContributed || 0;
    const lastEntry = v.lastEntryAt;
    const potAmt = v.currentPotAmount || 0;
    const potMax = v.potMax || 20000000;
    const potPct = potMax > 0 ? Math.min(100, (potAmt / potMax * 100)).toFixed(1) : 0;
    body = `
      ${potAmt > 0 ? `
      <div class="row"><span class="label">Current Pot</span><span class="value">${fmt(potAmt)} / ${fmt(potMax)}</span></div>
      <div style="background:var(--border);border-radius:4px;height:6px;margin:6px 0 8px;overflow:hidden">
        <div style="background:var(--accent);height:100%;width:${potPct}%;border-radius:4px;transition:width 0.3s"></div>
      </div>
      ` : ''}
      ${v.potStartDate ? '<div class="row"><span class="label">Started</span><span class="value">' + v.potStartDate + '</span></div>' : ''}
      <div class="row"><span class="label">Our Contribution</span><span class="value">${fmt(contributed)} pts</span></div>
      ${lastEntry ? '<div class="row"><span class="label">Last Contribution</span><span class="value">' + timeAgo(lastEntry) + '</span></div>' : ''}
    `;
  }

  return `
    <div class="card" style="${borderStyle}${!hasBrowserSession(state) ? 'opacity:0.6;' : ''}">
      ${cardHeader('vault', "MILLIONAIRE'S VAULT", summary, s.vaultMode === 'daily' ? 'daily' : 'once/pot')}
      ${cardBody('vault', body)}
    </div>`;
}

function renderNextSpend() {
  const hasCookie = !!state.currentCookie;
  const sim = state.simulation;
  const hasTimer = !!state.nextSpendAt;

  // Summary: countdown timer
  let summary = '';
  if (hasTimer) {
    summary = '<span class="countdown">' + countdown(state.nextSpendAt) + '</span>';
  } else {
    summary = '<span style="color:var(--dim)">—</span>';
  }

  let body = '';

  // Countdown row
  if (hasTimer) {
    body += '<div class="row"><span class="label">Next Spend In</span><span class="value countdown" id="cd">' + countdown(state.nextSpendAt) + '</span></div>';
  }

  // Simulation from cached state
  if (sim && sim !== null) {
    if (hasTimer) body += '<div class="divider"></div>';
    body += `
      <div class="row"><span class="label">Bonus Points</span><span class="value">${fmt(sim.bonusPoints)}</span></div>
      <div class="row"><span class="label">Buffer (keep)</span><span class="value">${fmt(sim.buffer)}</span></div>
      <div class="divider"></div>
      <div class="row">
        <span class="label">VIP Top-Off</span>
        <span class="value">${sim.vip.would ? '<span style="color:var(--green)">YES</span>' : '<span style="color:var(--dim)">no</span>'}</span>
      </div>
      <div class="row"><span class="sim-reason">${sim.vip.reason}</span></div>
      ${sim.wedge ? `
      <div class="divider"></div>
      <div class="row">
        <span class="label">Wedge Purchase</span>
        <span class="value">${sim.wedge.would ? '<span style="color:var(--green)">YES</span> (&minus;' + fmt(sim.wedge.cost) + ')' : '<span style="color:var(--dim)">no</span>'}</span>
      </div>
      <div class="row"><span class="sim-reason">${sim.wedge.reason}</span></div>
      ` : ''}
      <div class="divider"></div>
      <div class="row">
        <span class="label">Vault Entry</span>
        <span class="value">${sim.vault.would ? '<span style="color:var(--green)">YES</span> (&minus;' + fmt(sim.vault.cost) + ')' : '<span style="color:var(--dim)">no</span>'}</span>
      </div>
      <div class="row"><span class="sim-reason">${sim.vault.reason}</span></div>
      <div class="divider"></div>
      <div class="row"><span class="label">Upload Purchase</span><span class="value">${sim.upload.gb > 0 ? fmt(sim.upload.gb) + ' GB (&minus;' + fmt(sim.upload.cost) + ')' : '<span style="color:var(--dim)">none</span>'}</span></div>
      ${sim.upload.reason ? '<div class="row"><span class="sim-reason">' + sim.upload.reason + '</span></div>' : ''}
      <div class="divider"></div>
      <div class="row"><span class="label">Total Cost</span><span class="value" style="color:var(--yellow)">&minus;${fmt(sim.totalCost)}</span></div>
      <div class="row"><span class="label">Points After</span><span class="value">${fmt(sim.pointsAfter)}</span></div>
    `;
  } else {
    if (hasTimer) body += '<div class="divider"></div>';
    body += '<div class="empty" style="padding:8px 0">Refresh stats to see spend preview</div>';
  }

  body += `
    <div class="btn-row">
      <button class="primary" onclick="doSpend()" ${busy || !hasCookie ? 'disabled' : ''}>${busy ? 'Working...' : 'Spend Now'}</button>
    </div>
  `;

  return `
    <div class="card">
      ${cardHeader('next', 'NEXT SPEND', summary)}
      ${cardBody('next', body)}
    </div>`;
}

function renderLastSpend() {
  const ls = state.lastSpend || {};
  const lt = state.lifetime || {};
  if (!ls.at) return '';

  const summary = fmtDate(ls.at) + ' &middot; &minus;' + fmt(ls.pointsSpent) + ' pts';

  const body = `
    <div class="row"><span class="label">VIP Topped Off</span><span class="value">${ck(ls.vipPurchased)}</span></div>
    <div class="row"><span class="label">Wedge Purchased</span><span class="value">${ck(ls.wedgePurchased)}</span></div>
    <div class="row"><span class="label">Vault Entered</span><span class="value">${ck(ls.vaultEntered)}</span></div>
    <div class="row"><span class="label">Upload Purchased</span><span class="value">${fmt(ls.uploadGbPurchased)} GB</span></div>
    <div class="row"><span class="label">Points Spent</span><span class="value">${fmt(ls.pointsSpent)}</span></div>
    <div class="divider"></div>
    <div class="row"><span class="label" style="text-transform:uppercase;letter-spacing:1px;font-size:11px">Lifetime</span><span></span></div>
    <div class="row"><span class="label">Total Purchased</span><span class="value">${fmt(lt.totalGbPurchased)} GB</span></div>
    <div class="row"><span class="label">Total Spent</span><span class="value">${fmt(lt.totalPointsSpent)} pts</span></div>
  `;

  return `
    <div class="card">
      ${cardHeader('last', 'LAST SPEND', summary, fmtDate(ls.at))}
      ${cardBody('last', body)}
    </div>`;
}

function renderHistory(history) {
  if (!history || !history.length) return '<div class="empty">No spend history yet</div>';
  return history.slice().reverse().map(e => {
    const parts = [];
    if (e.vipPurchased) parts.push('VIP');
    if (e.wedgePurchased) parts.push('Wedge');
    if (e.vaultEntered) parts.push('Vault');
    if (e.uploadGbPurchased > 0) parts.push(fmt(e.uploadGbPurchased) + ' GB');
    const summary = parts.length ? parts.join(' + ') : 'no action';
    return `
    <div class="history-entry">
      <div class="history-meta">
        <span>${fmtDate(e.at)}</span>
        <span class="trigger-badge ${e.trigger}">${e.trigger}</span>
      </div>
      <div class="history-details">
        ${summary}  <span style="color:var(--dim)">(&minus;${fmt(e.pointsSpent)} pts)</span>
      </div>
    </div>`;
  }).join('');
}

function renderHistoryCard() {
  const history = state.spendHistory || [];
  const summary = history.length ? history.length + ' entries' : 'empty';

  return `
    <div class="card">
      ${cardHeader('history', 'SPEND HISTORY', summary)}
      ${cardBody('history', '<div class="history-list">' + renderHistory(history) + '</div>')}
    </div>`;
}

function renderSettings() {
  const s = state.settings || {};
  const hasCookie = !!state.currentCookie;
  const isPaused = !!state.paused;

  let statusParts = [];
  if (!hasCookie) {
    statusParts.push('<span style="color:var(--red)">no cookie</span>');
  }
  if (isBrowserSessionExpired(state)) {
    statusParts.push('<span style="color:var(--red)">mbsc expired</span>');
  } else if (!hasBrowserSession(state) && s.vaultMode && s.vaultMode !== 'off') {
    statusParts.push('<span style="color:var(--yellow)">no mbsc</span>');
  }
  if (isPaused) {
    statusParts.push('<span style="color:var(--red)">paused</span>');
  }
  const summary = statusParts.length ? statusParts.join(' &middot; ') : '<span style="color:var(--green)">ok</span>';

  const body = `
    <div class="setting-row">
      <label>Points Buffer</label>
      <input type="number" value="${s.pointsBuffer || 10000}" min="0" step="1000"
        onchange="saveSetting('pointsBuffer', parseInt(this.value))">
    </div>
    <div class="setting-row">
      <label>Spend Interval (hrs)</label>
      <input type="number" value="${s.spendIntervalHours || 24}" min="1" max="168" step="1"
        onchange="saveSetting('spendIntervalHours', parseInt(this.value))">
    </div>
    <div class="setting-row">
      <label>Min Upload Buy</label>
      <select onchange="saveSetting('minSpendGb', parseFloat(this.value))"
        style="background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;padding:4px 8px;border-radius:4px">
        <option value="0" ${s.minSpendGb==0?'selected':''}>Off</option>
        <option value="50" ${(s.minSpendGb||50)==50?'selected':''}>50 GB (25,000 pts)</option>
        <option value="100" ${s.minSpendGb==100?'selected':''}>100 GB (50,000 pts)</option>
      </select>
    </div>
    <div class="setting-row">
      <label>Freeleech Wedge</label>
      <select onchange="saveSetting('wedgeMode', this.value)"
        style="background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;padding:4px 8px;border-radius:4px">
        <option value="off" ${(s.wedgeMode||'off')==='off'?'selected':''}>Off</option>
        <option value="before" ${s.wedgeMode==='before'?'selected':''}>Before Upload</option>
        <option value="only" ${s.wedgeMode==='only'?'selected':''}>FL Only</option>
      </select>
    </div>
    <div class="setting-row">
      <label>Auto VIP</label>
      <label class="toggle">
        <input type="checkbox" ${s.autoVip ? 'checked' : ''}
          onchange="saveSetting('autoVip', this.checked)">
        <span class="slider"></span>
      </label>
    </div>
    <div class="setting-row">
      <label>Millionaire's Vault</label>
      <select onchange="saveSetting('vaultMode', this.value)"
        ${hasBrowserSession(state) ? '' : 'disabled'}
        style="background:var(--bg);border:1px solid var(--border);color:${hasBrowserSession(state) ? 'var(--text)' : 'var(--dim)'};font-family:var(--mono);font-size:12px;padding:4px 8px;border-radius:4px;${hasBrowserSession(state) ? '' : 'opacity:0.5;cursor:not-allowed'}">
        <option value="off" ${(s.vaultMode||'off')==='off'?'selected':''}>Off</option>
        <option value="once" ${s.vaultMode==='once'?'selected':''}>Once per pot</option>
        <option value="daily" ${s.vaultMode==='daily'?'selected':''}>Daily</option>
      </select>
    </div>
    ${!hasBrowserSession(state) ? '<div style="color:var(--dim);font-size:11px;font-style:italic;padding:0 0 8px">Set browser session below to enable vault</div>' : ''}
    <div class="divider"></div>
    <div class="setting-row">
      <label>Auto-Refresh</label>
      <label class="toggle">
        <input type="checkbox" ${s.autoRefresh !== false ? 'checked' : ''}
          onchange="saveSetting('autoRefresh', this.checked)">
        <span class="slider"></span>
      </label>
    </div>
    <div class="setting-row">
      <label>Refresh Interval (min)</label>
      <input type="number" value="${s.autoRefreshMinutes || 5}" min="1" max="60" step="1"
        onchange="saveSetting('autoRefreshMinutes', parseInt(this.value))"
        style="width:60px">
    </div>
    <div class="divider"></div>
    <div class="cookie-row">
      <span class="cookie-dot ${hasCookie ? 'set' : 'unset'}"></span>
      <span style="color:var(--dim);font-size:12px">Cookie ${hasCookie ? '&bull; Set' : '&bull; Not Set'}</span>
      <button style="flex:0;padding:6px 12px;font-size:11px" onclick="toggleCookie()">
        ${cookieVisible ? 'Cancel' : 'Set Cookie'}
      </button>
    </div>
    <input type="text" class="cookie-input ${cookieVisible ? 'visible' : ''}" id="cookieInput"
      placeholder="Paste mam_id cookie value..."
      onkeydown="if(event.key==='Enter')setCookie(this.value)">
    <div class="divider"></div>
    <div style="color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:8px 0 4px">Browser Session (for Vault)</div>
    ${isBrowserSessionExpired(state) ? '<div style="color:var(--red);font-size:11px;padding:0 0 8px">Session expired — paste a fresh mbsc cookie from your browser</div>' : ''}
    <div class="cookie-row">
      <span class="cookie-dot ${(state.browserSession||{}).mbsc ? (isBrowserSessionExpired(state) ? 'unset' : 'set') : 'unset'}"></span>
      <span style="color:var(--dim);font-size:12px">mbsc ${(state.browserSession||{}).mbsc ? (isBrowserSessionExpired(state) ? '&bull; Expired' : '&bull; Set') : '&bull; Not Set'}</span>
      <button style="flex:0;padding:6px 12px;font-size:11px" onclick="mbscVisible=!mbscVisible;render();if(mbscVisible){var i=document.getElementById('mbscInput');if(i)i.focus()}">
        ${mbscVisible ? 'Cancel' : 'Set'}
      </button>
    </div>
    <input type="text" class="cookie-input ${mbscVisible ? 'visible' : ''}" id="mbscInput"
      placeholder="Paste mbsc cookie value from browser..."
      onkeydown="if(event.key==='Enter')setBrowserSession('mbsc',this.value)">
    <div class="cookie-row">
      <span class="cookie-dot ${(state.browserSession||{}).userAgent ? 'set' : 'unset'}"></span>
      <span style="color:var(--dim);font-size:12px">User-Agent ${(state.browserSession||{}).userAgent ? '&bull; Set' : '&bull; Not Set'}</span>
      <button style="flex:0;padding:6px 12px;font-size:11px" onclick="uaVisible=!uaVisible;render();if(uaVisible){var i=document.getElementById('uaInput');if(i)i.focus()}">
        ${uaVisible ? 'Cancel' : 'Set'}
      </button>
    </div>
    <input type="text" class="cookie-input ${uaVisible ? 'visible' : ''}" id="uaInput"
      placeholder="Paste your browser User-Agent string..."
      onkeydown="if(event.key==='Enter')setBrowserSession('userAgent',this.value)">
    <div class="divider"></div>
    <div class="setting-row">
      <label>${isPaused ? 'Spending is paused' : 'Spending is active'}</label>
      <button style="flex:0;padding:6px 16px;font-size:11px;${isPaused ? 'border-color:var(--green);color:var(--green)' : 'border-color:var(--red);color:var(--red)'}"
        onclick="togglePause()">${isPaused ? 'Resume' : 'Pause'}</button>
    </div>
  `;

  return `
    <div class="card">
      ${cardHeader('settings', 'SETTINGS', summary)}
      ${cardBody('settings', body)}
    </div>`;
}

function render() {
  const isPaused = !!state.paused;

  $('app').innerHTML = `
    ${isPaused ? `
    <div class="paused-banner">
      <div>
        <div class="paused-label">PAUSED</div>
        <div class="paused-sub">Automated spending is suspended</div>
      </div>
      <button onclick="togglePause()">Resume</button>
    </div>
    ` : ''}

    <div class="two-col">
      <div class="col-left">
        ${renderStats()}
        ${renderVault()}
        ${renderSettings()}
      </div>
      <div class="col-right">
        ${renderNextSpend()}
        ${renderLastSpend()}
        ${renderHistoryCard()}
      </div>
    </div>

    <div class="status-msg">
      Polling every 30s${(state.settings || {}).autoRefresh !== false ? ' &middot; auto-refresh every ' + ((state.settings || {}).autoRefreshMinutes || 5) + 'min' : ''}
      &middot; <a href="https://github.com/dkjer/forager" target="_blank" rel="noopener" style="color:var(--dim);text-decoration:none">GitHub</a>
    </div>
  `;
}

function toggleCookie() {
  cookieVisible = !cookieVisible;
  render();
  if (cookieVisible) {
    const inp = $('cookieInput');
    if (inp) inp.focus();
  }
}

function startCountdown() {
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    const el = $('cd');
    if (el && state.nextSpendAt) {
      el.textContent = countdown(state.nextSpendAt);
    }
  }, 1000);
}

function setupAutoRefresh() {
  if (refreshInterval) clearInterval(refreshInterval);
  const s = state.settings || {};
  if (s.autoRefresh !== false) {
    const mins = s.autoRefreshMinutes || 5;
    refreshInterval = setInterval(doRefresh, mins * 60 * 1000);
  }
}

async function loadVersion() {
  try {
    const h = await api('/health');
    state.version = h.version;
  } catch(e) {}
}

async function init() {
  await loadVersion();
  await loadState();
  startCountdown();
  pollInterval = setInterval(loadState, 30000);
  setupAutoRefresh();
}

init();
</script>
</body>
</html>
